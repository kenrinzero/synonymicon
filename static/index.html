<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synonymicon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palette — warm cream tray, lighter inner cells */
      --background:        #f3ede2;
      --surface:           #ebe3d4;   /* outer "tray" cards — slightly warmer */
      --column:            #f7f2e8;   /* inner column cells — lighter than surface */
      --foreground:        #2a241c;
      --foreground-muted:  rgba(42, 36, 28, 0.65);
      --foreground-faint:  rgba(42, 36, 28, 0.45);
      --border:            rgba(42, 36, 28, 0.10);
      --border-strong:     rgba(42, 36, 28, 0.18);

      /* Shadows — soft for outer tray, subtle for inner cells */
      --shadow-soft:       0 8px 32px -8px rgba(50, 40, 25, 0.10),
                           0 2px 8px -2px rgba(50, 40, 25, 0.05);
      --shadow-subtle:     0 1px 4px rgba(50, 40, 25, 0.04);

      /* Derived */
      --watermark:         rgba(42, 36, 28, 0.07);
      --footer-bg:         rgba(235, 227, 212, 0.5);
      --error:             #a05050;

      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, "Times New Roman", serif;

      /* Layout */
      --left-ratio: 38fr;
      --right-ratio: 62fr;
      --gap-outer: 2.5rem;
      --gap-inner: 1rem;        /* gap between column cells */
      --radius-outer: 2rem;
      --radius-inner: 1.5rem;

      /* Animation */
      --page-transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Theme: penumbra (dark) ── */
    body[data-theme="penumbra"] {
      --background:        #1a1a1e;
      --surface:           #222226;
      --column:            #2a2a2e;
      --foreground:        #e0ddd6;
      --foreground-muted:  rgba(224, 221, 214, 0.60);
      --foreground-faint:  rgba(224, 221, 214, 0.35);
      --border:            rgba(224, 221, 214, 0.10);
      --border-strong:     rgba(224, 221, 214, 0.18);
      --shadow-soft:       0 8px 32px -8px rgba(0, 0, 0, 0.30),
                           0 2px 8px -2px rgba(0, 0, 0, 0.15);
      --shadow-subtle:     0 1px 4px rgba(0, 0, 0, 0.10);
      --watermark:         rgba(224, 221, 214, 0.06);
      --footer-bg:         rgba(34, 34, 38, 0.5);
      --error:             #c07070;
    }

    /* ── Theme: umbra (OLED) ── */
    body[data-theme="umbra"] {
      --background:        #000000;
      --surface:           #0c0c0e;
      --column:            #161618;
      --foreground:        #ece9e2;
      --foreground-muted:  rgba(236, 233, 226, 0.65);
      --foreground-faint:  rgba(236, 233, 226, 0.40);
      --border:            rgba(216, 213, 206, 0.08);
      --border-strong:     rgba(216, 213, 206, 0.14);
      --shadow-soft:       0 8px 32px -8px rgba(0, 0, 0, 0.50),
                           0 2px 8px -2px rgba(0, 0, 0, 0.25);
      --shadow-subtle:     0 1px 4px rgba(0, 0, 0, 0.20);
      --watermark:         rgba(216, 213, 206, 0.04);
      --footer-bg:         rgba(12, 12, 14, 0.5);
      --error:             #c07070;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-serif);
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "liga", "kern";
    }

    /* ────────────────────────────────────────────────────────── */
    /* Shell                                                      */
    /* ────────────────────────────────────────────────────────── */

    .shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .brand {
      position: absolute;
      top: 2rem;
      left: 2.5rem;
      z-index: 20;
      font-family: var(--font-serif);
      font-size: 1.75rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--foreground);
      cursor: pointer;
    }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: var(--left-ratio) var(--right-ratio);
      grid-template-rows: 1fr;       /* row fills available height */
      gap: var(--gap-outer);
      padding: 5rem var(--gap-outer) var(--gap-outer);
      min-height: 0;
    }

    /* ────────────────────────────────────────────────────────── */
    /* Left panel — search tray + watermark                       */
    /* ────────────────────────────────────────────────────────── */

    .left-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .watermark {
      position: absolute;
      left: -0.5rem;
      bottom: 1rem;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 18rem;
      line-height: 1;
      color: var(--watermark);
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    .search-tray {
      position: relative;
      z-index: 1;
      align-self: center;
      width: 100%;
      max-width: 32rem;
      margin-top: 18vh;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-outer);
      box-shadow: var(--shadow-soft);
    }

    .search-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.125rem;
      background: var(--column);
      border: 1px solid var(--border);
      border-radius: var(--radius-inner);
      box-shadow: var(--shadow-subtle);
      width: 100%;
    }

    .search-icon {
      flex-shrink: 0;
      width: 1.125rem;
      height: 1.125rem;
      color: var(--foreground-muted);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-serif);
      font-size: 1.0625rem;
      color: var(--foreground);
      padding: 0;
    }

    .search-input::placeholder {
      color: var(--foreground-muted);
      font-style: italic;
    }

    .search-submit {
      flex-shrink: 0;
      width: 2.125rem;
      height: 2.125rem;
      border-radius: 50%;
      background: var(--background);
      border: 1px solid var(--border-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--foreground);
      transition: background var(--page-transition);
    }

    .search-submit:hover {
      background: var(--surface);
    }

    .search-submit svg {
      width: 0.875rem;
      height: 0.875rem;
    }

    .controls-row {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 1rem 0.5rem 0.25rem;
      width: 100%;
    }

    .control-button {
        flex: 0 0 auto;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.25rem 0.5rem;
        background: transparent;
        border: none;
        cursor: pointer;
        font-family: var(--font-serif);
        font-size: 0.875rem;
        color: var(--foreground);
        transition: color var(--page-transition);
      }

    .control-button .text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      white-space: nowrap;
    }

    .control-button:hover {
      color: var(--foreground);
    }

    .control-button .label {
      color: var(--foreground-muted);
    }

    .control-button .value {
      font-weight: 500;
      color: var(--foreground);
    }

    .control-button svg {
      width: 1rem;
      height: 1rem;
      color: var(--foreground-muted);
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 0.25rem;
      background: var(--column);
      border: 1px solid var(--border);
      border-radius: var(--radius-inner);
      box-shadow: var(--shadow-soft);
      z-index: 30;
      overflow: hidden;
      display: none;
      min-width: 7rem;
    }

    .dropdown-menu.open {
      display: block;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: var(--font-serif);
      font-size: 0.9375rem;
      color: var(--foreground);
      text-align: left;
      transition: background var(--page-transition);
    }

    .dropdown-item:hover {
      background: var(--surface);
    }

    .dropdown-item .check-icon {
      width: 1rem;
      height: 1rem;
      flex-shrink: 0;
      color: var(--foreground-muted);
      opacity: 0;
    }

    .dropdown-item.checked .check-icon {
      opacity: 1;
    }

    .dropdown-divider {
      height: 1px;
      margin: 0.25rem 0.75rem;
      background: var(--border);
    }

    .control-wrapper {
      position: relative;
      flex: 1;
      min-width: 0;
      display: flex;
      justify-content: center;
    }

    .control-divider {
      flex: 0 0 auto;
      width: 1px;
      background: var(--border);
    }

    /* ────────────────────────────────────────────────────────── */
    /* Right panel — word surface                                 */
    /* ────────────────────────────────────────────────────────── */

    .right-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--foreground);
      transition: background var(--page-transition), opacity var(--page-transition);
    }

    .nav-arrow:hover {
      background: var(--background);
    }

    .nav-arrow:disabled {
      opacity: 0;
      pointer-events: none;
    }

    .nav-arrow.left  { left:  -0.5rem; }
    .nav-arrow.right { right: -0.5rem; }

    .nav-arrow svg {
      width: 0.875rem;
      height: 0.875rem;
    }

    .word-surface {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-outer);
      box-shadow: var(--shadow-soft);
      overflow: hidden;          /* clips peek column */
    }

    .columns-grid {
      flex: 1;
      display: grid;
      gap: var(--gap-inner);
      min-height: 0;
      overflow: hidden;
      animation: page-in var(--page-transition) ease-out;
    }

    .columns-grid.with-peek {
      /* grid-template-columns and width set inline by JS for responsive column count */
    }

    .columns-grid.no-peek {
      /* grid-template-columns and width set inline by JS for responsive column count */
    }

    @keyframes page-in {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .column-cell {
      background: var(--column);
      background-clip: padding-box;   /* prevents square corner from leaking past radius */
      border: 1px solid var(--border);
      border-radius: var(--radius-inner);
      box-shadow: var(--shadow-subtle);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .column-cell.empty {
      /* Reserved for future use; currently not rendered. */
      display: none;
    }

    .column-cell.span-all {
      grid-column: 1 / -1;
    }

    .column-inner {
      height: 100%;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ────────────────────────────────────────────────────────── */
    /* Entry                                                      */
    /* ────────────────────────────────────────────────────────── */

    .entry {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      cursor: default;
    }

    .entry-headword {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--foreground-muted);
      transition: color var(--page-transition);
      cursor: pointer;
    }

    .entry:hover .entry-headword {
      color: var(--foreground);
    }

    .entry-zipf {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--foreground-faint);
      margin-left: 0.375rem;
      vertical-align: super;
      letter-spacing: 0;
    }

    .entry-def {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.35;
      color: var(--foreground-muted);
      transition: color var(--page-transition);
    }

    .entry:hover .entry-def {
      color: var(--foreground);
    }

    .entry-def.undefined {
      color: var(--foreground-faint);
    }

    /* ────────────────────────────────────────────────────────── */
    /* Page indicator                                             */
    /* ────────────────────────────────────────────────────────── */

    .page-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding-top: 1.25rem;
    }

    .page-dot {
      background: var(--foreground-faint);
      border: none;
      cursor: pointer;
      padding: 0;
      border-radius: 9999px;
      width: 0.375rem;
      height: 0.375rem;
      transition: width var(--page-transition), height var(--page-transition), background var(--page-transition);
    }

    .page-dot.active {
      width: 1.25rem;
      height: 0.375rem;
      background: var(--foreground-muted);
    }

    .page-dot:not(.active):hover {
      background: var(--foreground-muted);
    }

    /* ────────────────────────────────────────────────────────── */
    /* States                                                     */
    /* ────────────────────────────────────────────────────────── */

    .state-message {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.0625rem;
      color: var(--foreground-muted);
      text-align: center;
    }

    .state-message.error {
      color: var(--error, #a05050);
    }

    /* ────────────────────────────────────────────────────────── */
    /* Loading dot                                                */
    /* ────────────────────────────────────────────────────────── */

    .loading-dot {
      position: absolute;
      bottom: 3.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--foreground-muted);
      animation: pulse 1.2s ease-in-out infinite;
      z-index: 5;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(1); }
      50%      { opacity: 1;   transform: translateX(-50%) scale(1.3); }
    }

    /* ────────────────────────────────────────────────────────── */
    /* Band separator                                             */
    /* ────────────────────────────────────────────────────────── */

    .band-separator {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding-top: 0.25rem;
      margin-bottom: 0.25rem;
    }

    .band-separator::before {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-strong);
    }

    .band-separator-label {
      font-size: 0.7rem;
      font-variant: small-caps;
      letter-spacing: 0.06em;
      color: var(--foreground-faint);
      white-space: nowrap;
    }

    .band-separator::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-strong);
    }

    /* ────────────────────────────────────────────────────────── */
    /* Footer                                                     */
    /* ────────────────────────────────────────────────────────── */

    footer {
      flex-shrink: 0;
      height: 4rem;
      padding: 0 var(--gap-outer);
      border-top: 1px solid var(--border);
      background: var(--footer-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }

    .footer-link {
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: var(--font-serif);
      font-size: 0.9375rem;
      color: var(--foreground-muted);
      transition: color var(--page-transition);
    }

    .footer-link:hover {
      color: var(--foreground);
    }

    /* ────────────────────────────────────────────────────────── */
    /* Mobile — ≤768px                                            */
    /* ────────────────────────────────────────────────────────── */

    @media (max-width: 768px) {
      html, body {
        height: 100dvh;
        overflow: hidden;
      }

      .shell {
        height: 100dvh;
        overflow: hidden;
      }

      .brand {
        position: static;
        padding: 1.25rem 1.5rem 0;
        font-size: 1.4rem;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        gap: 0;
        padding: 0;
      }

      .left-panel {
        flex-direction: column;
        min-width: 0;
      }

      .watermark {
        display: none;
      }

      .search-tray {
        margin-top: 0;
        padding: 1rem 1.25rem;
        max-width: 100%;
        border-radius: 0;
        box-shadow: none;
        border-bottom: 1px solid var(--border);
      }

      .search-tray .search-input {
        font-size: 0.95rem;
      }

      .controls-row {
        padding: 0.75rem 0 0;
      }

      .right-panel {
        position: relative;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .nav-arrow {
        width: 2.75rem;
        height: 2.75rem;
        min-width: 44px;
        min-height: 44px;
      }

      .nav-arrow.left  { left:  0.25rem; }
      .nav-arrow.right { right: 0.25rem; }

      .word-surface {
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
        padding: 1rem;
        flex: 1;
        overflow: hidden;
      }

      .page-indicator {
        padding-top: 1rem;
      }

      .page-dot {
        width: 0.5rem;
        height: 0.5rem;
      }

      footer {
        position: sticky;
        bottom: 0;
        z-index: 20;
        height: 3rem;
      }

      footer .footer-link.about {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1 class="brand" id="brand" role="button" tabindex="0">Synonymicon</h1>

    <main class="layout">
      <!-- ─────────── LEFT PANEL ─────────── -->
      <div class="left-panel">
        <div class="watermark" aria-hidden="true">&amp;</div>

        <section class="search-tray">
          <div class="search-card">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.3-4.3"/>
            </svg>
            <input
              id="search-input"
              class="search-input"
              type="text"
              placeholder="discover"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="search-submit" class="search-submit" type="button" aria-label="search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/>
                <path d="m12 5 7 7-7 7"/>
              </svg>
            </button>
          </div>

          <div class="controls-row">
            <div class="control-wrapper">
              <button id="corpus-button" class="control-button" type="button">
                <span class="text"><span class="label">corpus:</span><span id="corpus-value" class="value">wordfreq</span></span>
              </button>
              <div id="corpus-menu" class="dropdown-menu"></div>
            </div>
            <div class="control-divider"></div>
            <div class="control-wrapper">
              <button id="freq-button" class="control-button" type="button">
                <span class="text"><span class="label">frequency:</span><span id="freq-value" class="value">all</span></span>
              </button>
              <div id="freq-menu" class="dropdown-menu"></div>
            </div>
            <div class="control-divider"></div>
            <div class="control-wrapper">
              <button id="pos-button" class="control-button" type="button">
                <span class="text"><span class="label">pos:</span><span id="pos-value" class="value">all</span></span>
              </button>
              <div id="pos-menu" class="dropdown-menu"></div>
            </div>
          </div>
        </section>
      </div>

      <!-- ─────────── RIGHT PANEL ─────────── -->
      <section class="right-panel">
        <button id="nav-prev" class="nav-arrow left" type="button" aria-label="previous page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </button>
        <button id="nav-next" class="nav-arrow right" type="button" aria-label="next page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </button>

        <div class="word-surface">
          <div id="columns-grid" class="columns-grid"></div>
          <div id="page-indicator" class="page-indicator"></div>
        </div>
      </section>
    </main>

    <footer>
      <button id="theme-button" class="footer-link" type="button">lumen</button>
      <button class="footer-link about" type="button">about</button>
    </footer>
  </div>

  <script>
    // ────────────────────────────────────────────────────────────
    // Constants
    // ────────────────────────────────────────────────────────────
    const ITEM_HEIGHT_PX = 130;
    const COLUMN_PADDING_PX = 80;
    const INDICATOR_RESERVE_PX = 50;

    const FREQUENCY_TIERS = [
      { label: "all",      value: "all" },
      { label: "common",   value: "common" },
      { label: "10k–30k",  value: "uncommon" },
      { label: "30k–80k",  value: "rare" },
      { label: "80k–150k", value: "exotic" },
      { label: "150k+",    value: "absurd" },
    ];

    const BAND_DISPLAY = {
      common:   "~0–10k",
      uncommon: "~10k–30k",
      rare:     "~30k–80k",
      exotic:   "~80k–150k",
      absurd:   "~150k+",
    };

    const POS_TIERS = [
      { label: "all",       value: "all" },
      { label: "noun",      value: "noun" },
      { label: "verb",      value: "verb" },
      { label: "adjective", value: "adj" },
      { label: "adverb",    value: "adv" },
    ];

    // ────────────────────────────────────────────────────────────
    // State
    // ────────────────────────────────────────────────────────────
    let results = [];
    let currentPage = 0;
    let selectedTiers = new Set(["all"]);
    let selectedPos = new Set(["all"]);
    let selectedCorpus = "wordfreq";
    let lastSearchedWord = "";
    let isLoading = false;

    // ────────────────────────────────────────────────────────────
    // DOM refs
    // ────────────────────────────────────────────────────────────
    const grid = document.getElementById("columns-grid");
    const indicator = document.getElementById("page-indicator");
    const prevBtn = document.getElementById("nav-prev");
    const nextBtn = document.getElementById("nav-next");
    const searchInput = document.getElementById("search-input");
    const searchSubmit = document.getElementById("search-submit");
    const wordSurface = document.querySelector(".word-surface");
    const freqButton = document.getElementById("freq-button");
    const freqValue = document.getElementById("freq-value");
    const freqMenu = document.getElementById("freq-menu");
    const posButton = document.getElementById("pos-button");
    const posValue = document.getElementById("pos-value");
    const posMenu = document.getElementById("pos-menu");
    const corpusButton = document.getElementById("corpus-button");
    const corpusValue = document.getElementById("corpus-value");
    const corpusMenu = document.getElementById("corpus-menu");

    // ────────────────────────────────────────────────────────────
    // Layout math
    // ────────────────────────────────────────────────────────────
    function getColumnsPerPage() {
      const w = window.innerWidth;
      if (w >= 1150) return 3;
      if (w >= 800)  return 2;
      return 1;
    }

    function calculateItemsPerColumn() {
      if (!wordSurface) return 5;
      const surfaceHeight = wordSurface.clientHeight;
      const surfacePadding = 48;
      const available = surfaceHeight - surfacePadding - INDICATOR_RESERVE_PX - COLUMN_PADDING_PX;
      const items = Math.floor(available / ITEM_HEIGHT_PX);
      return Math.max(3, items);
    }

    function chunkIntoColumns(items, perColumn) {
      const cols = [];
      for (let i = 0; i < items.length; i += perColumn) {
        cols.push(items.slice(i, i + perColumn));
      }
      return cols;
    }

    function chunkIntoPages(columns, perPage) {
      const pages = [];
      for (let i = 0; i < columns.length; i += perPage) {
        pages.push(columns.slice(i, i + perPage));
      }
      return pages.length === 0 ? [[]] : pages;
    }

    // ────────────────────────────────────────────────────────────
    // Render — entries
    // ────────────────────────────────────────────────────────────
    function renderEntry(entry) {
      const div = document.createElement("div");
      div.className = "entry";

      const headword = document.createElement("h3");
      headword.className = "entry-headword";
      headword.textContent = entry.word;

      if (typeof entry.zipf === "number") {
        const zipf = document.createElement("span");
        zipf.className = "entry-zipf";
        zipf.textContent = entry.zipf.toFixed(1);
        headword.appendChild(zipf);
      }

      headword.addEventListener("click", () => pivotToWord(entry.word));

      const def = document.createElement("p");
      def.className = "entry-def";
      if (!entry.definition || entry.definition === "[undefined]") {
        def.classList.add("undefined");
        def.textContent = "[undefined]";
      } else {
        def.textContent = entry.definition;
      }

      div.appendChild(headword);
      div.appendChild(def);
      return div;
    }

    function renderBandSeparator(band) {
      const sep = document.createElement("div");
      sep.className = "band-separator";
      const label = document.createElement("span");
      label.className = "band-separator-label";
      label.textContent = BAND_DISPLAY[band] || band;
      sep.appendChild(label);
      return sep;
    }

    // ────────────────────────────────────────────────────────────
    // Render — columns with cross-column band tracking
    // ────────────────────────────────────────────────────────────
    function renderColumn(entries, prevBand) {
      const cell = document.createElement("div");
      cell.className = "column-cell";

      const inner = document.createElement("div");
      inner.className = "column-inner";

      let lastBand = prevBand;
      entries.forEach(e => {
        if (e.band !== lastBand) {
          inner.appendChild(renderBandSeparator(e.band));
          lastBand = e.band;
        }
        inner.appendChild(renderEntry(e));
      });

      cell._lastBand = lastBand;
      cell.appendChild(inner);
      return cell;
    }

    // ────────────────────────────────────────────────────────────
    // Render — states
    // ────────────────────────────────────────────────────────────
    function setLoading(on) {
      isLoading = on;
      let dot = wordSurface.querySelector(".loading-dot");
      if (on) {
        if (!dot) {
          dot = document.createElement("div");
          dot.className = "loading-dot";
          wordSurface.appendChild(dot);
        }
      } else {
        if (dot) dot.remove();
      }
    }

    function renderEmptyState(message) {
      const div = document.createElement("div");
      div.className = "state-message";
      div.textContent = message;
      return div;
    }

    function renderErrorState(message, isValidation = false) {
      const div = document.createElement("div");
      div.className = "state-message" + (isValidation ? "" : " error");
      div.textContent = message;
      return div;
    }

    // ────────────────────────────────────────────────────────────
    // Render — main
    // ────────────────────────────────────────────────────────────
    function render() {
      const colsPerPage = getColumnsPerPage();
      const itemsPerCol = calculateItemsPerColumn();
      const allColumns = chunkIntoColumns(results, itemsPerCol);
      const pages = chunkIntoPages(allColumns, colsPerPage);

      if (currentPage >= pages.length) currentPage = pages.length - 1;
      if (currentPage < 0) currentPage = 0;

      const pageColumns = pages[currentPage] || [];
      const isLastPage = currentPage === pages.length - 1;
      const showPeek = !isLastPage && pages.length > 1 && colsPerPage > 1;

      grid.innerHTML = "";
      grid.classList.remove("with-peek", "no-peek");
      void grid.offsetWidth;

      if (showPeek) {
        grid.classList.add("with-peek");
        const totalCols = colsPerPage + 1;
        grid.style.gridTemplateColumns = `repeat(${totalCols}, 1fr)`;
        grid.style.width = `${(totalCols / colsPerPage) * 100}%`;
      } else {
        grid.classList.add("no-peek");
        grid.style.gridTemplateColumns = `repeat(${colsPerPage}, 1fr)`;
        grid.style.width = "100%";
      }

      if (isLoading) {
        // Loading dot is managed separately; grid stays empty
      } else if (pageColumns.length === 0) {
        const cell = document.createElement("div");
        cell.style.cssText = "grid-column:1/-1;display:grid;place-items:center;";
        const msg = document.createElement("span");
        msg.style.cssText = "padding:2.5rem 2rem;font-family:var(--font-serif);font-style:italic;font-size:1.0625rem;color:var(--foreground-muted);text-align:center;";
        msg.textContent = lastSearchedWord
          ? "no synonyms found in this band — try a wider frequency"
          : "begin with a word";
        cell.appendChild(msg);
        grid.appendChild(cell);
      } else {
        let prevBand = null;
        // Determine the band of the last entry on the previous page
        if (currentPage > 0) {
          const prevPageCols = pages[currentPage - 1];
          const lastPrevCol = prevPageCols[prevPageCols.length - 1];
          if (lastPrevCol && lastPrevCol.length > 0) {
            prevBand = lastPrevCol[lastPrevCol.length - 1].band;
          }
        }

        pageColumns.forEach(col => {
          if (col.length > 0) {
            const cell = renderColumn(col, prevBand);
            prevBand = cell._lastBand;
            grid.appendChild(cell);
          }
        });

        if (showPeek) {
          const peekCol = pages[currentPage + 1][0];
          if (peekCol && peekCol.length > 0) {
            const peek = renderColumn(peekCol, prevBand);
            peek.setAttribute("aria-hidden", "true");
            grid.appendChild(peek);
          }
        }
      }

      renderIndicator(pages.length);
      renderNavArrows(pages.length);
    }

    function renderIndicator(pageCount) {
      indicator.innerHTML = "";
      if (pageCount <= 1) return;

      for (let i = 0; i < pageCount; i++) {
        const dot = document.createElement("button");
        dot.className = "page-dot" + (i === currentPage ? " active" : "");
        dot.type = "button";
        dot.setAttribute("aria-label", `Go to page ${i + 1}`);
        dot.addEventListener("click", () => {
          currentPage = i;
          render();
        });
        indicator.appendChild(dot);
      }
    }

    function renderNavArrows(pageCount) {
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage >= pageCount - 1;
    }

    // ────────────────────────────────────────────────────────────
    // Fetch
    // ────────────────────────────────────────────────────────────
    let abortController = null;
    let debounceTimer = null;

    async function fetchSynonyms(word, pushState = true) {
      if (abortController) abortController.abort();
      abortController = new AbortController();
      setLoading(true);

      const tierParam = Array.from(selectedTiers).join(",");
      const posParam = Array.from(selectedPos).join(",");
      const corpusParam = selectedCorpus;
      if (pushState) {
        const params = new URLSearchParams({ word, tier: tierParam, pos: posParam, corpus: corpusParam });
        history.pushState({ word, tiers: tierParam, pos: posParam, corpus: corpusParam }, "", `?${params}`);
      }

      try {
        const url = `/synonyms?word=${encodeURIComponent(word)}&tier=${encodeURIComponent(tierParam)}&pos=${encodeURIComponent(posParam)}&corpus=${encodeURIComponent(corpusParam)}`;
        const res = await fetch(url, { signal: abortController.signal });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || res.status);
        }
        const data = await res.json();
        results = data;
        currentPage = 0;
      } catch (err) {
        if (err.name === "AbortError") return;
        results = [];
        currentPage = 0;
        grid.innerHTML = "";
        grid.classList.remove("with-peek");
        grid.classList.add("no-peek");
        const cols = getColumnsPerPage();
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.style.width = "100%";
        const cell = document.createElement("div");
        cell.className = "column-cell span-all";
        const isValidation = err.message && err.message.includes("single-word");
        cell.appendChild(renderErrorState(err.message || "something went wrong — check the backend log", isValidation));
        grid.appendChild(cell);
        renderIndicator(0);
        renderNavArrows(0);
        setLoading(false);
        return;
      }

      setLoading(false);
      render();
    }

    function pivotToWord(word) {
      searchInput.value = word;
      lastSearchedWord = word;
      currentPage = 0;
      fetchSynonyms(word, true);
    }

    function debouncedSearch() {
      const word = searchInput.value.trim();
      clearTimeout(debounceTimer);
      if (abortController) abortController.abort();

      if (!word) return;

      lastSearchedWord = word;
      debounceTimer = setTimeout(() => fetchSynonyms(word, false), 250);
    }

    // ────────────────────────────────────────────────────────────
    // Search events
    // ────────────────────────────────────────────────────────────
    searchInput.addEventListener("input", debouncedSearch);

    // ────────────────────────────────────────────────────────────
    // Reset to empty state
    // ────────────────────────────────────────────────────────────
    function resetToEmpty() {
      searchInput.value = "";
      lastSearchedWord = "";
      results = [];
      currentPage = 0;
      if (abortController) abortController.abort();
      history.replaceState(null, "", window.location.pathname);
      render();
    }

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        clearTimeout(debounceTimer);
        const word = searchInput.value.trim();
        if (word) {
          lastSearchedWord = word;
          fetchSynonyms(word);
        } else {
          resetToEmpty();
        }
      }
    });

    searchSubmit.addEventListener("click", () => {
      clearTimeout(debounceTimer);
      const word = searchInput.value.trim();
      if (word) {
        lastSearchedWord = word;
        fetchSynonyms(word);
      }
    });

    // Brand click — reset to empty state
    const brand = document.getElementById("brand");
    brand.addEventListener("click", resetToEmpty);
    brand.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") resetToEmpty(); });

    // ────────────────────────────────────────────────────────────
    // Frequency dropdown
    // ────────────────────────────────────────────────────────────
    function updateFreqLabel() {
      if (selectedTiers.has("all")) {
        freqValue.textContent = "all";
      } else if (selectedTiers.size === 1) {
        const val = Array.from(selectedTiers)[0];
        const tier = FREQUENCY_TIERS.find(t => t.value === val);
        freqValue.textContent = tier ? tier.label : val;
      } else {
        freqValue.textContent = "custom";
      }
    }

    function buildFreqMenu() {
      // "all" option
      const allItem = document.createElement("button");
      allItem.className = "dropdown-item" + (selectedTiers.has("all") ? " checked" : "");
      allItem.type = "button";
      allItem.innerHTML = `<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg><span>all</span>`;
      allItem.addEventListener("click", () => {
        selectedTiers.clear();
        selectedTiers.add("all");
        refreshFreqMenu();
        freqMenu.classList.remove("open");
        if (lastSearchedWord) fetchSynonyms(lastSearchedWord, false);
      });
      freqMenu.appendChild(allItem);

      // Divider
      const divider = document.createElement("div");
      divider.className = "dropdown-divider";
      freqMenu.appendChild(divider);

      // Band options
      FREQUENCY_TIERS.filter(t => t.value !== "all").forEach(t => {
        const item = document.createElement("button");
        item.className = "dropdown-item" + (selectedTiers.has(t.value) ? " checked" : "");
        item.type = "button";
        item.innerHTML = `<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg><span>${t.label}</span>`;
        item.addEventListener("click", () => {
          if (selectedTiers.has(t.value)) {
            selectedTiers.delete(t.value);
            if (selectedTiers.size === 0) selectedTiers.add("all");
          } else {
            selectedTiers.delete("all");
            selectedTiers.add(t.value);
          }
          refreshFreqMenu();
          freqMenu.classList.remove("open");
          if (lastSearchedWord) fetchSynonyms(lastSearchedWord, false);
        });
        freqMenu.appendChild(item);
      });
    }

    const BAND_TIERS = FREQUENCY_TIERS.filter(t => t.value !== "all").map(t => t.value);

    function refreshFreqMenu() {
      // If all individual bands are selected, collapse to "all"
      if (BAND_TIERS.every(t => selectedTiers.has(t))) {
        selectedTiers.clear();
        selectedTiers.add("all");
      }
      freqMenu.innerHTML = "";
      buildFreqMenu();
      updateFreqLabel();
    }

    freqButton.addEventListener("click", (e) => {
      e.stopPropagation();
      freqMenu.classList.toggle("open");
    });

    document.addEventListener("click", () => {
      freqMenu.classList.remove("open");
    });

    // ────────────────────────────────────────────────────────────
    // Corpus dropdown (single-select)
    // ────────────────────────────────────────────────────────────
    const CORPUS_OPTIONS = [
      { label: "wordfreq",       value: "wordfreq" },
      { label: "subtlex",        value: "subtlex" },
      { label: "bnc",            value: "bnc" },
      { label: "google_1grams",  value: "google_1grams" },
      { label: "wikipedia",      value: "wikipedia" },
      { label: "kaggle",         value: "kaggle" },
      { label: "opensubtitles",  value: "opensubtitles" },
      { label: "gutenberg",      value: "gutenberg" },
      { label: "leipzig_news",    value: "leipzig_news" },
      { label: "leipzig_web_com", value: "leipzig_web_com" },
      { label: "leipzig_web_uk", value: "leipzig_web_uk" },
    ];

    function buildCorpusMenu() {
      corpusMenu.innerHTML = "";
      CORPUS_OPTIONS.forEach(opt => {
        const item = document.createElement("button");
        item.className = "dropdown-item" + (selectedCorpus === opt.value ? " checked" : "");
        item.type = "button";
        item.innerHTML = `<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg><span>${opt.label}</span>`;
        item.addEventListener("click", () => {
          selectedCorpus = opt.value;
          corpusValue.textContent = opt.label;
          buildCorpusMenu();
          corpusMenu.classList.remove("open");
        });
        corpusMenu.appendChild(item);
      });
    }

    corpusButton.addEventListener("click", (e) => {
      e.stopPropagation();
      corpusMenu.classList.toggle("open");
    });

    document.addEventListener("click", () => {
      corpusMenu.classList.remove("open");
    });

    buildCorpusMenu();

    // ────────────────────────────────────────────────────────────
    // POS dropdown
    // ────────────────────────────────────────────────────────────
    function updatePosLabel() {
      if (selectedPos.has("all")) {
        posValue.textContent = "all";
      } else if (selectedPos.size === 1) {
        const val = Array.from(selectedPos)[0];
        const tier = POS_TIERS.find(t => t.value === val);
        posValue.textContent = tier ? tier.label : val;
      } else {
        posValue.textContent = "custom";
      }
    }

    function buildPosMenu() {
      posMenu.innerHTML = "";

      // "all" option
      const allItem = document.createElement("button");
      allItem.className = "dropdown-item" + (selectedPos.has("all") ? " checked" : "");
      allItem.type = "button";
      allItem.innerHTML = `<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg><span>all</span>`;
      allItem.addEventListener("click", () => {
        selectedPos.clear();
        selectedPos.add("all");
        refreshPosMenu();
        posMenu.classList.remove("open");
        if (lastSearchedWord) fetchSynonyms(lastSearchedWord, false);
      });
      posMenu.appendChild(allItem);

      // Divider
      const divider = document.createElement("div");
      divider.className = "dropdown-divider";
      posMenu.appendChild(divider);

      // POS options
      POS_TIERS.filter(t => t.value !== "all").forEach(t => {
        const item = document.createElement("button");
        item.className = "dropdown-item" + (selectedPos.has(t.value) ? " checked" : "");
        item.type = "button";
        item.innerHTML = `<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg><span>${t.label}</span>`;
        item.addEventListener("click", () => {
          if (selectedPos.has(t.value)) {
            selectedPos.delete(t.value);
            if (selectedPos.size === 0) selectedPos.add("all");
          } else {
            selectedPos.delete("all");
            selectedPos.add(t.value);
          }
          refreshPosMenu();
          posMenu.classList.remove("open");
          if (lastSearchedWord) fetchSynonyms(lastSearchedWord, false);
        });
        posMenu.appendChild(item);
      });
    }

    const POS_TYPES = POS_TIERS.filter(t => t.value !== "all").map(t => t.value);

    function refreshPosMenu() {
      if (POS_TYPES.every(t => selectedPos.has(t))) {
        selectedPos.clear();
        selectedPos.add("all");
      }
      posMenu.innerHTML = "";
      buildPosMenu();
      updatePosLabel();
    }

    posButton.addEventListener("click", (e) => {
      e.stopPropagation();
      posMenu.classList.toggle("open");
    });

    buildPosMenu();

    document.addEventListener("click", () => {
      posMenu.classList.remove("open");
    });

    // ────────────────────────────────────────────────────────────
    // Navigation
    // ────────────────────────────────────────────────────────────
    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) { currentPage--; render(); }
    });

    nextBtn.addEventListener("click", () => {
      const colsPerPage = getColumnsPerPage();
      const itemsPerCol = calculateItemsPerColumn();
      const totalPages = Math.ceil(chunkIntoColumns(results, itemsPerCol).length / colsPerPage);
      if (currentPage < totalPages - 1) { currentPage++; render(); }
    });

    let resizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(render, 150);
    });

    window.addEventListener("popstate", (e) => {
      const state = e.state;
      if (state && state.word) {
        searchInput.value = state.word;
        lastSearchedWord = state.word;
        if (state.tiers) {
          selectedTiers = new Set(state.tiers.split(","));
          refreshFreqMenu();
        }
        if (state.pos) {
          selectedPos = new Set(state.pos.split(","));
          refreshPosMenu();
        }
        if (state.corpus) {
          selectedCorpus = state.corpus;
          corpusValue.textContent = CORPUS_OPTIONS.find(o => o.value === selectedCorpus)?.label || selectedCorpus;
          buildCorpusMenu();
        }
        fetchSynonyms(state.word, false);
      }
    });

    // ────────────────────────────────────────────────────────────
    // Theme
    // ────────────────────────────────────────────────────────────
    const THEMES = ["lumen", "penumbra", "umbra"];
    let themeIndex = THEMES.indexOf(localStorage.getItem("theme") || "lumen");
    if (themeIndex === -1) themeIndex = 0;

    const themeButton = document.getElementById("theme-button");

    function applyTheme() {
      const theme = THEMES[themeIndex];
      document.body.dataset.theme = theme;
      themeButton.textContent = theme;
      localStorage.setItem("theme", theme);
    }

    themeButton.addEventListener("click", () => {
      themeIndex = (themeIndex + 1) % THEMES.length;
      applyTheme();
    });

    applyTheme();

    // ────────────────────────────────────────────────────────────
    // Init
    // ────────────────────────────────────────────────────────────
    buildFreqMenu();

    // Read URL params on load (bookmarkable queries + back/forward)
    const initParams = new URLSearchParams(window.location.search);
    const initWord = initParams.get("word");
    const initTier = initParams.get("tier");
    const initPos = initParams.get("pos");
    const initCorpus = initParams.get("corpus");
    if (initWord) {
      searchInput.value = initWord;
      lastSearchedWord = initWord;
      if (initTier) {
        selectedTiers = new Set(initTier.split(","));
        refreshFreqMenu();
      }
      if (initPos) {
        selectedPos = new Set(initPos.split(","));
        refreshPosMenu();
      }
      if (initCorpus) {
        selectedCorpus = initCorpus;
        corpusValue.textContent = CORPUS_OPTIONS.find(o => o.value === selectedCorpus)?.label || selectedCorpus;
        buildCorpusMenu();
      }
      fetchSynonyms(initWord, false);
    } else {
      render();
    }
    searchInput.focus();
  </script>
</body>
</html>
