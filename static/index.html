<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synonymicon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palette — warm cream tray, lighter inner cells */
      --background:        #f3ede2;
      --surface:           #ebe3d4;   /* outer "tray" cards — slightly warmer */
      --column:            #f7f2e8;   /* inner column cells — lighter than surface */
      --foreground:        #2a241c;
      --foreground-muted:  rgba(42, 36, 28, 0.65);
      --foreground-faint:  rgba(42, 36, 28, 0.45);
      --border:            rgba(42, 36, 28, 0.10);
      --border-strong:     rgba(42, 36, 28, 0.18);

      /* Shadows — soft for outer tray, subtle for inner cells */
      --shadow-soft:       0 8px 32px -8px rgba(50, 40, 25, 0.10),
                           0 2px 8px -2px rgba(50, 40, 25, 0.05);
      --shadow-subtle:     0 1px 4px rgba(50, 40, 25, 0.04);

      /* Typography */
      --font-serif: "Cormorant Garamond", Georgia, "Times New Roman", serif;

      /* Layout */
      --left-ratio: 38fr;
      --right-ratio: 62fr;
      --gap-outer: 2.5rem;
      --gap-inner: 1rem;        /* gap between column cells */
      --radius-outer: 2rem;
      --radius-inner: 1.5rem;

      /* Animation */
      --page-transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-serif);
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "liga", "kern";
    }

    /* ────────────────────────────────────────────────────────── */
    /* Shell                                                      */
    /* ────────────────────────────────────────────────────────── */

    .shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .brand {
      position: absolute;
      top: 2rem;
      left: 2.5rem;
      z-index: 20;
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--foreground);
    }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: var(--left-ratio) var(--right-ratio);
      grid-template-rows: 1fr;       /* row fills available height */
      gap: var(--gap-outer);
      padding: 5rem var(--gap-outer) var(--gap-outer);
      min-height: 0;
    }

    /* ────────────────────────────────────────────────────────── */
    /* Left panel — search tray + watermark                       */
    /* ────────────────────────────────────────────────────────── */

    .left-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .watermark {
      position: absolute;
      left: -0.5rem;
      bottom: 1rem;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 18rem;
      line-height: 1;
      color: rgba(42, 36, 28, 0.07);
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    .search-tray {
      position: relative;
      z-index: 1;
      align-self: center;
      width: 100%;
      max-width: 28rem;
      margin-top: 18vh;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-outer);
      box-shadow: var(--shadow-soft);
    }

    .search-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.125rem;
      background: var(--column);
      border: 1px solid var(--border);
      border-radius: var(--radius-inner);
      box-shadow: var(--shadow-subtle);
    }

    .search-icon {
      flex-shrink: 0;
      width: 1.125rem;
      height: 1.125rem;
      color: var(--foreground-muted);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-serif);
      font-size: 1.0625rem;
      color: var(--foreground);
      padding: 0;
    }

    .search-input::placeholder {
      color: var(--foreground-muted);
      font-style: italic;
    }

    .search-submit {
      flex-shrink: 0;
      width: 2.125rem;
      height: 2.125rem;
      border-radius: 50%;
      background: var(--background);
      border: 1px solid var(--border-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--foreground);
      transition: background var(--page-transition);
    }

    .search-submit:hover {
      background: var(--surface);
    }

    .search-submit svg {
      width: 0.875rem;
      height: 0.875rem;
    }

    .controls-row {
      display: flex;
      align-items: stretch;
      gap: 0.75rem;
      padding: 1rem 0.5rem 0.25rem;
    }

    .control-button {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.25rem 0.25rem;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: var(--font-serif);
      font-size: 0.9375rem;
      color: var(--foreground);
      transition: color var(--page-transition);
    }

    .control-button:hover {
      color: var(--foreground);
    }

    .control-button .label {
      color: var(--foreground-muted);
    }

    .control-button .value {
      font-weight: 500;
      color: var(--foreground);
    }

    .control-button svg {
      width: 1rem;
      height: 1rem;
      color: var(--foreground-muted);
    }

    .control-divider {
      width: 1px;
      background: var(--border);
    }

    /* ────────────────────────────────────────────────────────── */
    /* Right panel — word surface                                 */
    /* ────────────────────────────────────────────────────────── */

    .right-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--foreground);
      transition: background var(--page-transition), opacity var(--page-transition);
    }

    .nav-arrow:hover {
      background: var(--background);
    }

    .nav-arrow:disabled {
      opacity: 0;
      pointer-events: none;
    }

    .nav-arrow.left  { left:  -0.5rem; }
    .nav-arrow.right { right: -0.5rem; }

    .nav-arrow svg {
      width: 0.875rem;
      height: 0.875rem;
    }

    .word-surface {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-outer);
      box-shadow: var(--shadow-soft);
      overflow: hidden;          /* clips peek column */
    }

    .columns-grid {
      flex: 1;
      display: grid;
      gap: var(--gap-inner);
      min-height: 0;
      animation: page-in var(--page-transition) ease-out;
    }

    .columns-grid.with-peek {
      /* 4 columns; col 4 bleeds ~36px past the surface's overflow:hidden */
      grid-template-columns: 1fr 1fr 1fr 1fr;
      width: calc(133.333% - 4rem);
    }

    .columns-grid.no-peek {
      grid-template-columns: 1fr 1fr 1fr;
      width: 100%;
    }

    @keyframes page-in {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .column-cell {
      background: var(--column);
      background-clip: padding-box;   /* prevents square corner from leaking past radius */
      border: 1px solid var(--border);
      border-radius: var(--radius-inner);
      box-shadow: var(--shadow-subtle);
      overflow: hidden;
    }

    .column-cell.empty {
      /* Reserved for future use; currently not rendered. */
      display: none;
    }

    .column-inner {
      height: 100%;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      overflow: hidden;
    }

    /* ────────────────────────────────────────────────────────── */
    /* Entry                                                      */
    /* ────────────────────────────────────────────────────────── */

    .entry {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      cursor: default;
    }

    .entry-headword {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: rgba(42, 36, 28, 0.85);
      transition: color var(--page-transition);
    }

    .entry:hover .entry-headword {
      color: var(--foreground);
    }

    .entry-zipf {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--foreground-faint);
      margin-left: 0.375rem;
      vertical-align: super;
      letter-spacing: 0;
    }

    .entry-def {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.35;
      color: var(--foreground-muted);
      transition: color var(--page-transition);
    }

    .entry:hover .entry-def {
      color: rgba(42, 36, 28, 0.78);
    }

    .entry-def.undefined {
      color: var(--foreground-faint);
    }

    /* ────────────────────────────────────────────────────────── */
    /* Page indicator                                             */
    /* ────────────────────────────────────────────────────────── */

    .page-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding-top: 1.25rem;
    }

    .page-dot {
      background: rgba(42, 36, 28, 0.25);
      border: none;
      cursor: pointer;
      padding: 0;
      border-radius: 9999px;
      transition: width var(--page-transition), height var(--page-transition), background var(--page-transition);
    }

    .page-dot {
      width: 0.375rem;
      height: 0.375rem;
    }

    .page-dot.active {
      width: 1.25rem;
      height: 0.375rem;
      background: rgba(42, 36, 28, 0.7);
    }

    .page-dot:not(.active):hover {
      background: rgba(42, 36, 28, 0.4);
    }

    /* ────────────────────────────────────────────────────────── */
    /* States                                                     */
    /* ────────────────────────────────────────────────────────── */

    .state-message {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.0625rem;
      color: var(--foreground-muted);
      text-align: center;
    }

    .state-message.error {
      color: #a05050;
    }

    /* ────────────────────────────────────────────────────────── */
    /* Footer                                                     */
    /* ────────────────────────────────────────────────────────── */

    footer {
      flex-shrink: 0;
      height: 4rem;
      padding: 0 var(--gap-outer);
      border-top: 1px solid var(--border);
      background: rgba(235, 227, 212, 0.5);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1.5rem;
    }

    .footer-link {
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: var(--font-serif);
      font-size: 0.9375rem;
      color: rgba(42, 36, 28, 0.75);
      transition: color var(--page-transition);
    }

    .footer-link:hover {
      color: var(--foreground);
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1 class="brand">Synonymicon</h1>

    <main class="layout">
      <!-- ─────────── LEFT PANEL ─────────── -->
      <div class="left-panel">
        <div class="watermark" aria-hidden="true">&amp;</div>

        <section class="search-tray">
          <div class="search-card">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.3-4.3"/>
            </svg>
            <input
              id="search-input"
              class="search-input"
              type="text"
              placeholder="discover rare synonyms"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="search-submit" class="search-submit" type="button" aria-label="search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/>
                <path d="m12 5 7 7-7 7"/>
              </svg>
            </button>
          </div>

          <div class="controls-row">
            <button class="control-button" type="button">
              <span><span class="label">corpus: </span><span class="value">wordfreq</span></span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </button>
            <div class="control-divider"></div>
            <button class="control-button" type="button">
              <span><span class="label">frequency: </span><span class="value">all</span></span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </button>
          </div>
        </section>
      </div>

      <!-- ─────────── RIGHT PANEL ─────────── -->
      <section class="right-panel">
        <button id="nav-prev" class="nav-arrow left" type="button" aria-label="previous page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </button>
        <button id="nav-next" class="nav-arrow right" type="button" aria-label="next page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </button>

        <div class="word-surface">
          <div id="columns-grid" class="columns-grid"></div>
          <div id="page-indicator" class="page-indicator"></div>
        </div>
      </section>
    </main>

    <footer>
      <button class="footer-link" type="button">About</button>
    </footer>
  </div>

  <script>
    // ────────────────────────────────────────────────────────────
    // Placeholder data. Replace with real /synonyms response.
    // Expected shape: { word, definition, zipf, band }
    // ────────────────────────────────────────────────────────────
    const PLACEHOLDER_RESULTS = [
      { word: "recondite",     definition: "little known; abstruse; difficult to penetrate.", zipf: 2.1, band: "rare" },
      { word: "abstruse",      definition: "difficult to understand; deeply subtle.",         zipf: 2.4, band: "rare" },
      { word: "esoteric",      definition: "intended for or understood by the initiated; arcane.", zipf: 3.0, band: "uncommon" },
      { word: "obscure",       definition: "not discovered or known about; unclear.",         zipf: 3.6, band: "uncommon" },
      { word: "arcane",        definition: "understood by few; mysterious; secret.",          zipf: 2.9, band: "uncommon" },
      { word: "abditive",      definition: "tending to hide or withdraw; secretive.",         zipf: 0.5, band: "absurd" },
      { word: "occulted",      definition: "hidden; concealed from view or knowledge.",       zipf: 1.8, band: "very rare" },
      { word: "implicative",   definition: "suggesting something indirectly; implied.",       zipf: 1.5, band: "very rare" },
      { word: "inscitable",    definition: "incapable of being roused or provoked.",          zipf: 0.3, band: "absurd" },
      { word: "rebarbative",   definition: "tending to repel; offensive; disagreeable.",      zipf: 1.1, band: "very rare" },
      { word: "caliginous",    definition: "covered with mist; obscure; dark.",                zipf: 0.7, band: "absurd" },
      { word: "doleful",       definition: "causing grief or lamentation.",                    zipf: 2.0, band: "rare" },
      { word: "querulous",     definition: "occurring rarely; complaining peevishly.",         zipf: 1.9, band: "very rare" },
      { word: "ineluctable",   definition: "too certain to be avoided; inescapable.",          zipf: 1.4, band: "very rare" },
      { word: "tenebrous",     definition: "dark; obscure; gloomy.",                           zipf: 1.2, band: "very rare" },
      { word: "lugubrious",    definition: "looking or sounding sad and dismal.",              zipf: 1.6, band: "very rare" },
      { word: "perspicacious", definition: "having keen mental perception and understanding.", zipf: 2.0, band: "rare" },
      { word: "pellucid",      definition: "translucently clear; easily understood.",          zipf: 1.7, band: "very rare" },
      { word: "recherché",     definition: "rare; exotic; carefully chosen.",                  zipf: 1.3, band: "very rare" },
      { word: "sesquipedalian",definition: "characterized by long words; long-winded.",        zipf: 0.9, band: "absurd" },
      { word: "desuetude",     definition: "a state of disuse or inactivity.",                 zipf: 0.8, band: "absurd" },
      { word: "crepuscular",   definition: "of or resembling twilight; dim.",                  zipf: 1.5, band: "very rare" },
      { word: "stygian",       definition: "extremely dark, gloomy, or forbidding.",           zipf: 1.4, band: "very rare" },
      { word: "byzantine",     definition: "excessively complicated; intricate.",              zipf: 3.0, band: "uncommon" },
      { word: "inscrutable",   definition: "impossible to understand or interpret.",           zipf: 2.5, band: "rare" },
      { word: "hermetic",      definition: "completely sealed; airtight; impervious.",         zipf: 2.1, band: "rare" },
      { word: "chthonic",      definition: "concerning the deities or spirits of the underworld.", zipf: 0.6, band: "absurd" },
      { word: "saturnine",     definition: "slow and gloomy; cold and steady in mood.",        zipf: 1.5, band: "very rare" },
      { word: "fuliginous",    definition: "sooty; dusky; resembling smoke.",                  zipf: 0.4, band: "absurd" },
      { word: "gnomic",        definition: "expressed in or of the nature of short pithy maxims.", zipf: 1.1, band: "very rare" }
    ];

    // ────────────────────────────────────────────────────────────
    // State
    // ────────────────────────────────────────────────────────────
    const COLUMNS_PER_PAGE = 3;
    const ITEM_HEIGHT_PX = 130;       // headword + 2-line def + gap, with corner margin
    const COLUMN_PADDING_PX = 80;     // top + bottom padding inside .column-inner
    const INDICATOR_RESERVE_PX = 50;  // approx height of page indicator + its top padding

    let results = PLACEHOLDER_RESULTS.slice();
    let currentPage = 0;

    // ────────────────────────────────────────────────────────────
    // DOM refs
    // ────────────────────────────────────────────────────────────
    const grid = document.getElementById("columns-grid");
    const indicator = document.getElementById("page-indicator");
    const prevBtn = document.getElementById("nav-prev");
    const nextBtn = document.getElementById("nav-next");
    const searchInput = document.getElementById("search-input");
    const searchSubmit = document.getElementById("search-submit");

    // ────────────────────────────────────────────────────────────
    // Layout math
    // ────────────────────────────────────────────────────────────
    function calculateItemsPerColumn() {
      const surface = document.querySelector(".word-surface");
      if (!surface) return 5;
      const surfaceHeight = surface.clientHeight;
      const surfacePadding = 48; // 1.5rem top + 1.5rem bottom
      const available = surfaceHeight - surfacePadding - INDICATOR_RESERVE_PX - COLUMN_PADDING_PX;
      const items = Math.floor(available / ITEM_HEIGHT_PX);
      return Math.max(3, items);
    }

    function chunkIntoColumns(items, perColumn) {
      const cols = [];
      for (let i = 0; i < items.length; i += perColumn) {
        cols.push(items.slice(i, i + perColumn));
      }
      return cols;
    }

    function chunkIntoPages(columns, perPage) {
      const pages = [];
      for (let i = 0; i < columns.length; i += perPage) {
        pages.push(columns.slice(i, i + perPage));
      }
      return pages.length === 0 ? [[]] : pages;
    }

    // ────────────────────────────────────────────────────────────
    // Render
    // ────────────────────────────────────────────────────────────
    function renderEntry(entry) {
      const div = document.createElement("div");
      div.className = "entry";

      const headword = document.createElement("h3");
      headword.className = "entry-headword";
      headword.textContent = entry.word;

      if (typeof entry.zipf === "number") {
        const zipf = document.createElement("span");
        zipf.className = "entry-zipf";
        zipf.textContent = entry.zipf.toFixed(1);
        headword.appendChild(zipf);
      }

      const def = document.createElement("p");
      def.className = "entry-def";
      if (!entry.definition || entry.definition === "[undefined]") {
        def.classList.add("undefined");
        def.textContent = "[undefined]";
      } else {
        def.textContent = entry.definition;
      }

      div.appendChild(headword);
      div.appendChild(def);
      return div;
    }

    function renderColumn(entries) {
      const cell = document.createElement("div");
      cell.className = "column-cell";

      const inner = document.createElement("div");
      inner.className = "column-inner";

      entries.forEach(e => inner.appendChild(renderEntry(e)));

      cell.appendChild(inner);
      return cell;
    }

    function renderEmptyState(message) {
      const div = document.createElement("div");
      div.className = "state-message";
      div.textContent = message;
      return div;
    }

    function render() {
      const itemsPerCol = calculateItemsPerColumn();
      const allColumns = chunkIntoColumns(results, itemsPerCol);
      const pages = chunkIntoPages(allColumns, COLUMNS_PER_PAGE);

      // Clamp current page
      if (currentPage >= pages.length) currentPage = pages.length - 1;
      if (currentPage < 0) currentPage = 0;

      const pageColumns = pages[currentPage] || [];
      const isLastPage = currentPage === pages.length - 1;
      const showPeek = !isLastPage && pages.length > 1;

      // Force reflow + restart animation by removing/re-adding the class
      grid.innerHTML = "";
      grid.classList.remove("with-peek", "no-peek");
      // Trigger reflow so animation restarts
      void grid.offsetWidth;
      grid.classList.add(showPeek ? "with-peek" : "no-peek");

      if (pageColumns.length === 0) {
        grid.appendChild(renderEmptyState("no results"));
      } else {
        // Render up to COLUMNS_PER_PAGE cells; empty slots are simply not rendered
        pageColumns.forEach(col => {
          if (col.length > 0) grid.appendChild(renderColumn(col));
        });

        // If peeking, render the first column of the next page
        if (showPeek) {
          const peekCol = pages[currentPage + 1][0];
          if (peekCol && peekCol.length > 0) {
            const peek = renderColumn(peekCol);
            peek.setAttribute("aria-hidden", "true");
            grid.appendChild(peek);
          }
        }
      }

      renderIndicator(pages.length);
      renderNavArrows(pages.length);
    }

    function renderIndicator(pageCount) {
      indicator.innerHTML = "";
      if (pageCount <= 1) return;

      for (let i = 0; i < pageCount; i++) {
        const dot = document.createElement("button");
        dot.className = "page-dot" + (i === currentPage ? " active" : "");
        dot.type = "button";
        dot.setAttribute("aria-label", `Go to page ${i + 1}`);
        dot.addEventListener("click", () => {
          currentPage = i;
          render();
        });
        indicator.appendChild(dot);
      }
    }

    function renderNavArrows(pageCount) {
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage >= pageCount - 1;
    }

    // ────────────────────────────────────────────────────────────
    // Public hook for swapping data later
    // ────────────────────────────────────────────────────────────
    window.setResults = function(newResults) {
      results = newResults || [];
      currentPage = 0;
      render();
    };

    // ────────────────────────────────────────────────────────────
    // Events
    // ────────────────────────────────────────────────────────────
    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) { currentPage--; render(); }
    });

    nextBtn.addEventListener("click", () => {
      const itemsPerCol = calculateItemsPerColumn();
      const totalPages = Math.ceil(chunkIntoColumns(results, itemsPerCol).length / COLUMNS_PER_PAGE);
      if (currentPage < totalPages - 1) { currentPage++; render(); }
    });

    let resizeRaf = null;
    window.addEventListener("resize", () => {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(render);
    });

    // ────────────────────────────────────────────────────────────
    // Init
    // ────────────────────────────────────────────────────────────
    render();
